```html
<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>共享夏日报名</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-orange-50 min-h-screen flex flex-col items-center">

<!-- 活动横幅 -->
<img
        src="summer_banner.png"
        alt="共享夏日横幅"
        class="w-full max-h-[460px] object-cover mx-auto"
/>

<!-- 报名卡片 -->
<main
        class="w-full max-w-xl bg-white bg-opacity-95 rounded-2xl shadow-lg
               p-6 sm:p-8 mt-6 mb-10 mx-4"
>
    <h1 class="text-3xl sm:text-4xl font-bold text-orange-500 text-center mb-6">
        ☀️ 共享夏日 🌴
    </h1>

    <p class="text-center text-gray-700 mb-2">
        🕠 时间：2026 年 7 月 18 日（SAT）5:30 PM
    </p>

    <p class="text-center text-gray-700 mb-6">
        📍 地点：16152 Gale Ave, Hacienda Heights, CA
    </p>

    <p class="text-center text-lg font-semibold text-orange-700 mb-6">
        请填写以下信息，一起来享受夏日派对 🎉
    </p>

    <form
            id="registrationForm"
            action="https://script.google.com/macros/s/AKfycby-wGAAxMJIcoZRI1nV3M3y1vKrXoLQyZwjmaHFSoZIGV3RgaWpYbJ5lAnhMiF22eHj/exec"
            method="POST"
            novalidate
            class="flex flex-col gap-4"
    >
        <!-- 姓名 -->
        <div>
            <label
                    for="name_cn"
                    class="block text-sm font-medium text-gray-700 mb-1"
            >
                姓名 <span class="text-red-500">*</span>
            </label>

            <input
                    id="name_cn"
                    type="text"
                    name="name_cn"
                    placeholder="请输入您的名字"
                    autocomplete="name"
                    class="w-full border border-orange-200 rounded-lg p-3
                           outline-none focus:ring-2 focus:ring-orange-400
                           focus:border-orange-400"
            />
        </div>

        <!-- 用户看到的格式化电话号码 -->
        <div>
            <label
                    for="phoneDisplay"
                    class="block text-sm font-medium text-gray-700 mb-1"
            >
                手机号码 <span class="text-red-500">*</span>
            </label>

            <input
                    id="phoneDisplay"
                    type="tel"
                    placeholder="请输入手机号码"
                    autocomplete="tel"
                    inputmode="numeric"
                    maxlength="14"
                    class="w-full border border-orange-200 rounded-lg p-3
                           outline-none focus:ring-2 focus:ring-orange-400
                           focus:border-orange-400"
            />
        </div>

        <!-- 提交给 Google Apps Script 的纯数字电话号码 -->
        <input
                id="phone"
                type="hidden"
                name="phone"
                value=""
        />

        <!-- 年龄 -->
        <div>
            <label
                    for="age"
                    class="block text-sm font-medium text-gray-700 mb-1"
            >
                年龄范围 <span class="text-red-500">*</span>
            </label>

            <select
                    id="age"
                    name="age"
                    class="w-full border border-orange-200 rounded-lg p-3
                           bg-white outline-none focus:ring-2 focus:ring-orange-400
                           focus:border-orange-400"
            >
                <option value="" selected disabled>请选择年龄范围</option>
                <option value="18-25岁">18-25岁</option>
                <option value="26-30岁">26-30岁</option>
                <option value="31-35岁">31-35岁</option>
                <option value="36-40岁">36-40岁</option>
                <option value="40岁以上">40岁以上</option>
            </select>
        </div>

        <!-- 性别 -->
        <div>
            <label
                    for="gender"
                    class="block text-sm font-medium text-gray-700 mb-1"
            >
                性别 <span class="text-red-500">*</span>
            </label>

            <select
                    id="gender"
                    name="gender"
                    class="w-full border border-orange-200 rounded-lg p-3
                           bg-white outline-none focus:ring-2 focus:ring-orange-400
                           focus:border-orange-400"
            >
                <option value="" selected disabled>请选择性别</option>
                <option value="男">男</option>
                <option value="女">女</option>
            </select>
        </div>

        <!-- 提交按钮 -->
        <button
                id="submitButton"
                type="submit"
                class="bg-orange-500 hover:bg-orange-600 disabled:bg-orange-300
                       text-white font-bold py-3 rounded-xl shadow-md
                       transition-colors duration-200"
        >
            ☀️ 我要参加共享夏日
        </button>
    </form>

    <p class="mt-8 text-center text-sm text-gray-500">
        📧 有疑问请联系：
        <a
                href="mailto:gracedesign7000@gmail.com"
                class="text-orange-600 underline"
        >
            gracedesign7000@gmail.com
        </a>
    </p>
</main>

<script>
    const form = document.getElementById("registrationForm");
    const nameInput = document.getElementById("name_cn");
    const phoneDisplayInput = document.getElementById("phoneDisplay");
    const phoneHiddenInput = document.getElementById("phone");
    const ageSelect = document.getElementById("age");
    const genderSelect = document.getElementById("gender");
    const submitButton = document.getElementById("submitButton");

    /**
     * 只保留数字，并限制为10位。
     */
    function getPhoneDigits(value) {
        return value.replace(/\D/g, "").slice(0, 10);
    }

    /**
     * 将号码显示为美国常见格式：
     * (123) 456-7890
     */
    function formatPhoneNumber(value) {
        const digits = getPhoneDigits(value);

        if (digits.length === 0) {
            return "";
        }

        if (digits.length <= 3) {
            return `(${digits}`;
        }

        if (digits.length <= 6) {
            return `(${digits.slice(0, 3)}) ${digits.slice(3)}`;
        }

        return `(${digits.slice(0, 3)}) ${digits.slice(3, 6)}-${digits.slice(6)}`;
    }

    /**
     * 输入过程中自动格式化。
     */
    phoneDisplayInput.addEventListener("input", function () {
        this.value = formatPhoneNumber(this.value);

        // 隐藏字段始终保存纯数字
        phoneHiddenInput.value = getPhoneDigits(this.value);
    });

    /**
     * 表单验证与提交。
     */
    form.addEventListener("submit", function (event) {
        event.preventDefault();

        const name = nameInput.value.trim();
        const phoneDigits = getPhoneDigits(phoneDisplayInput.value);
        const age = ageSelect.value;
        const gender = genderSelect.value;

        if (!name) {
            alert("请输入您的名字。");
            nameInput.focus();
            return;
        }

        if (!phoneDigits) {
            alert("请输入手机号码。");
            phoneDisplayInput.focus();
            return;
        }

        if (phoneDigits.length !== 10) {
            alert("请输入完整的10位数字电话号码。");
            phoneDisplayInput.focus();
            return;
        }

        if (!age) {
            alert("请选择年龄范围。");
            ageSelect.focus();
            return;
        }

        if (!gender) {
            alert("请选择性别。");
            genderSelect.focus();
            return;
        }

        // 提交给 Google Sheet 的电话号码为纯10位数字
        phoneHiddenInput.value = phoneDigits;

        submitButton.disabled = true;
        submitButton.textContent = "正在提交，请稍候…";

        alert("☀️ 感谢您的报名！期待与您一同共享夏日 🎉");

        // 验证完成后执行真正提交
        form.submit();
    });
</script>

</body>
</html>
