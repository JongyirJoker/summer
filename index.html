<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>共享夏日报名</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-orange-50 relative min-h-screen flex flex-col items-center justify-start">

<img src="summer_banner.png" alt="共享夏日横幅"
     class="w-full max-h-[460px] object-cover mx-auto" />

<div class="w-full max-w-xl bg-white bg-opacity-95 rounded-2xl shadow-lg p-8 mt-6 z-10 relative">
    <h1 class="text-4xl font-bold text-orange-500 mb-6 text-center">☀️ 共享夏日 🌴</h1>

    <p class="text-center text-gray-700 mb-2">🕠 时间：2026 年 7 月 18 日（SAT）5:30 PM</p>
    <p class="text-center text-gray-700 mb-6">📍 地点：16152 Gale Ave, Hacienda Heights, CA</p>

    <p class="text-center text-lg font-semibold mb-6 text-orange-700">
        请填写以下信息，一起来享受夏日聚会 🙌
    </p>

    <form
            action="https://script.google.com/macros/s/AKfycby-wGAAxMJIcoZRI1nV3M3y1vKrXoLQyZwjmaHFSoZIGV3RgaWpYbJ5lAnhMiF22eHj/exec"
            method="POST"
            onsubmit="return validateForm();"
            class="flex flex-col gap-4"
    >

        <input type="text" name="name_cn" placeholder="名字"
               class="border border-orange-200 rounded-lg p-3 w-full focus:ring-2 focus:ring-orange-400" />

        <input type="tel" name="phone" placeholder="手机号码（电话或邮箱至少填一项）"
               class="border border-orange-200 rounded-lg p-3 w-full focus:ring-2 focus:ring-orange-400" />

        <input type="email" name="email" placeholder="Email（电话或邮箱至少填一项）"
               class="border border-orange-200 rounded-lg p-3 w-full focus:ring-2 focus:ring-orange-400" />

        <select name="age" required class="border border-orange-200 rounded-lg p-3 w-full focus:ring-2 focus:ring-orange-400">
            <option value="" disabled selected>年龄范围</option>
            <option value="18-25岁">18-25岁</option>
            <option value="26-30岁">26-30岁</option>
            <option value="31-35岁">31-35岁</option>
            <option value="36-40岁">36-40岁</option>
        </select>

        <select name="gender" required class="border border-orange-200 rounded-lg p-3 w-full focus:ring-2 focus:ring-orange-400">
            <option value="" disabled selected>性别</option>
            <option value="男">男</option>
            <option value="女">女</option>
        </select>

        <button type="submit"
                class="bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 rounded-xl transition-colors duration-200 shadow-md">
            ☀️ 我要参加共享夏日
        </button>
    </form>

    <p class="mt-8 text-center text-sm text-gray-500">
        📧 有疑问请联系：
        <a href="mailto:gracedesign7000@gmail.com" class="text-orange-600 underline">
            gracedesign7000@gmail.com
        </a>
    </p>
</div>

<script>
    function validateForm() {
        const phone = document.querySelector('[name="phone"]').value.trim();
        const email = document.querySelector('[name="email"]').value.trim();

        if (!phone && !email) {
            alert("请至少填写手机号码或 Email");
            return false;
        }

        alert("☀️ 感谢您的报名！期待与您一同共享夏日 🎉");
        return true;
    }
</script>

</body>
</html>
